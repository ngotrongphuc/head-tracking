appId: com.headtracking.app
productName: Head Tracking
directories:
  buildResources: build
  output: dist
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.*'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
win:
  icon: build/icon.ico
  target: nsis
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
